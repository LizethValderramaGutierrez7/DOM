<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DOM</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>
<body>
    <h1 id="mainTitle" class="text-center">Manipulación del DOM</h1>
    <form>
        <label for="">Nombre: </label>
        <input id="nameIpt" type="text">
        <button id="formBtn" type="submit" class="btn btn-primary">Mostrar</button>
    </form>
<br>
     <form>
        <label for="">Correo: </label>
        <input id="emailIpt" type="text">
        <button id="emailBtn" type="submit" class="btn btn-primary">Mostrar</button>
    </form>
<br>
     <form>
        <label for="">Edad: </label>
        <input id="ageIpt" type="number" min="1" step="1">
        <button id="ageBtn" type="submit" class="btn btn-primary">Mostrar</button>
        
    <form id="miFormulario">
    <button type="submit">Limpiar</button>
</form>

    <h2 id="greeting"></h2>

    <div id="feedbackAlert" class="alert alert-danger" role="alert" style="display: none;">
  ¡Necesitas ingresar un nombre valido!
</div>

    <h2 id="greeting2"></h2>

    <div id="feedbackAlert2" class="alert alert-danger" role="alert" style="display: none;">
  ¡El correo NO es válido. Revisa el @ o el punto!
</div>

<h2 id="greeting3"></h2>

<div id="feedbackAlert3" class="alert alert-danger" role="alert" style="display: none;">
  ¡Ingresa una edad valida!
</div>

<div id="contenedorAlertas"></div>

    <script src="./javascript/main.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</body>
</html>
